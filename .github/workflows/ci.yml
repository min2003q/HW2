name: Build, Push, and Deploy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_push:
    # 빌드 및 푸시는 GitHub이 제공하는 우분투 환경에서 수행합니다.
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # PR인 경우에는 로그인하지 않고, Push 이벤트일 때만 로그인
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api
          tags: |
            # main/master 브랜치에 푸시되는 경우 latest 태그를 기본적으로 붙입니다.
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:buildcache,mode=max

  deploy:
    # 1. build_and_push 작업이 성공적으로 끝난 후 실행
    needs: build_and_push
    # 2. PR이 아닌 직접 푸시(Merge 등) 된 경우에만 배포 실행
    if: github.event_name != 'pull_request'
    # 3. GitHub에 등록된 로컬의 Self-hosted Runner 에서 실행
    runs-on: self-hosted
    
    steps:
      - name: Deploy to Local Self-hosted Runner
        run: |
          # 1. Docker Hub에서 새롭게 푸시된 최신(latest) 이미지 다운로드
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:latest
          
          # 2. 기존에 실행 중인 동일한 이름의 컨테이너가 있다면 중지하고 삭제 (처음 실행시 발생할 수 있는 에러는 || true 로 쿨하게 무시!)
          docker stop weight-machine-api || true
          docker rm weight-machine-api || true
          
          # 3. 새로운 이미지로 컨테이너 실행 (백그라운드에서 실행하며 8000번 포트 연결)
          # 재부팅 시에도 자동으로 실행될 수 있도록 --restart unless-stopped 추가
          docker run -d \
            --name weight-machine-api \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:latest
