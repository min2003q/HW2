name: Build, Push, and Deploy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:buildcache,mode=max

  deploy:
    needs: build_and_push
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Deploy to Local Self-hosted Runner
        shell: powershell
        run: |
          # 1. 최신 이미지 다운로드
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:latest
          
          # 2. 기존 컨테이너 강제 정리 (에러가 나도 무시하고 진행)
          $containerName = "weight-machine-api"
          try {
              docker rm -f $containerName
          } catch {
              Write-Host "No existing container to remove."
          }
          
          # 3. 새 컨테이너 실행
          docker run -d --name $containerName -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:latest