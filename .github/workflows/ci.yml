name: Build, Push, and Deploy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_push:
    # 빌드 및 푸시는 GitHub이 제공하는 우분투 환경에서 수행합니다.
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # PR인 경우에는 로그인하지 않고, Push 이벤트일 때만 로그인
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api
          tags: |
            # main/master 브랜치에 푸시되는 경우 latest 태그를 기본적으로 붙입니다.
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:buildcache,mode=max

  deploy:
    needs: build_and_push
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    
    steps:
      - name: Deploy to Local Self-hosted Runner
        shell: pwsh
        run: |
          # 1. 최신 이미지 다운로드
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:latest
          
          # 2. 기존 컨테이너가 있으면 끄고 지우기 (오류 무시 처리)
          $containerName = "weight-machine-api"
          if (docker ps -a -q -f name=$containerName) {
              docker stop $containerName
              docker rm $containerName
          }
          
          # 3. 새 컨테이너 실행
          docker run -d --name $containerName -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/weight-machine-api:latest